---
# Backend v1
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-v1
  namespace: demo
  labels:
    app: backend
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
      version: v1
  template:
    metadata:
      labels:
        app: backend
        version: v1
    spec:
      containers:
        - name: backend
          image: demo/backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: VERSION
              value: "v1"
            - name: APP_NAME
              value: "backend"
            - name: DOWNSTREAM_URL
              value: "http://downstream-v1:8080"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: backend-v1
  namespace: demo
  labels:
    app: backend
    version: v1
spec:
  selector:
    app: backend
    version: v1
  ports:
    - port: 8080
      targetPort: 8080

---
# Backend v2
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-v2
  namespace: demo
  labels:
    app: backend
    version: v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
      version: v2
  template:
    metadata:
      labels:
        app: backend
        version: v2
    spec:
      containers:
        - name: backend
          image: demo/backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: VERSION
              value: "v2"
            - name: APP_NAME
              value: "backend"
            - name: DOWNSTREAM_URL
              value: "http://downstream-v2:8080"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: backend-v2
  namespace: demo
  labels:
    app: backend
    version: v2
spec:
  selector:
    app: backend
    version: v2
  ports:
    - port: 8080
      targetPort: 8080

---
# Active backend service — selector is patched by switch-v1.sh / switch-v2.sh
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: demo
  labels:
    app: backend
  annotations:
    # Start on v1; updated by switch scripts
    active-version: "v1"
spec:
  selector:
    app: backend
    version: v1
  ports:
    - port: 8080
      targetPort: 8080
