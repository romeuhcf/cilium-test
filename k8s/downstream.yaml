---
# Downstream v1
apiVersion: apps/v1
kind: Deployment
metadata:
  name: downstream-v1
  namespace: demo
  labels:
    app: downstream
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: downstream
      version: v1
  template:
    metadata:
      labels:
        app: downstream
        version: v1
    spec:
      containers:
        - name: downstream
          image: demo/downstream:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: VERSION
              value: "v1"
            - name: APP_NAME
              value: "downstream"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: downstream-v1
  namespace: demo
  labels:
    app: downstream
    version: v1
spec:
  selector:
    app: downstream
    version: v1
  ports:
    - port: 8080
      targetPort: 8080

