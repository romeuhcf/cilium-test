kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: cilium-cluster
nodes:
  - role: control-plane
    extraPortMappings:
      # Frontend NodePort
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
      # Hubble UI NodePort
      - containerPort: 30888
        hostPort: 8888
        protocol: TCP
  - role: worker
networking:
  # Disable default CNI so Cilium can be installed
  disableDefaultCNI: true
  # Disable kube-proxy — Cilium replaces it with eBPF
  kubeProxyMode: "none"
